services:
  jellystacks:
    image: incredibad/jellystacks:latest
    container_name: jellystacks
    ports:
      - "7284:7284"
    volumes:
      - jellystacks_data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
    restart: unless-stopped

volumes:
  jellystacks_data:
