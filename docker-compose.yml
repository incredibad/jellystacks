services:
  jellystacks:
    build: .
    container_name: jellystacks
    ports:
      - "8000:8000"
    volumes:
      - jellystacks_data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - DATABASE_URL=sqlite:////data/jellystacks.db
    restart: unless-stopped

volumes:
  jellystacks_data:
